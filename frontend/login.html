<!DOCTYPE html>
<html>
<head>
  <title>Login - Personal Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background: #f7f8fc; }</style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
      <h2 class="text-center mb-4">Login</h2>
      <input type="email" id="email" class="form-control mb-3" placeholder="Email">
      <input type="password" id="password" class="form-control mb-3" placeholder="Password">
      <button class="btn btn-primary w-100" onclick="login()">Login</button>
      <p class="mt-3 text-center">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:5000/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    // Save token & name to localStorage
    localStorage.setItem("token", data.token);
    localStorage.setItem("name", data.name);
    console.log("Saved Token:", data.token);  // Debugging

    if (res.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("name", data.name);
      window.location.href = "dashboard.html";
    } else {
      alert(data.msg);
    }
}
</script>
</body>
</html>
