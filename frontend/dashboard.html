<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Personal Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background: #f7f8fc; }</style>
</head>
<body onload="loadDashboard()">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Welcome, <span id="username"></span>!</h2>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
    <div class="card p-3 shadow mb-4">
      <textarea id="noteContent" class="form-control mb-3" placeholder="Write your note here..."></textarea>
      <button class="btn btn-success" onclick="addNote()">Add Note</button>
    </div>
    <div id="notesList" class="row"></div>
  </div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

document.getElementById("username").innerText = localStorage.getItem("name");
// Function to handle expired tokens automatically
async function fetchWithAuth(url, options = {}) {
    const res = await fetch(url, { 
        ...options, 
        headers: { ...options.headers, "x-auth-token": token } 
    });
    if (res.status === 401) {  // Token expired or invalid
        alert("Session expired. Please login again.");
        logout();
    }
    return res;
}
// Auto-logout after 30 seconds (client-side)
setTimeout(() => {
    alert("Session expired. Please login again.");
    logout();
}, 30000);

async function addNote() {
    const content = document.getElementById("noteContent").value;
    const res = await fetchWithAuth("http://localhost:5000/api/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content })
    });
    if (res.ok) {
        document.getElementById("noteContent").value = "";
        loadDashboard();
    } else {
        alert("Error adding note");
    }
}

async function loadDashboard() {
     const res = await fetchWithAuth("http://localhost:5000/api/notes");
    const notes = await res.json();
    const container = document.getElementById("notesList");
    container.innerHTML = "";
    notes.forEach(note => {
        container.innerHTML += `
          <div class="col-md-4 mb-3">
            <div class="card p-3 shadow">
              <p>${note.content}</p>
              <button class="btn btn-danger btn-sm" onclick="deleteNote('${note._id}')">Delete</button>
            </div>
          </div>`;
    });
}

async function deleteNote(id) {
    await fetchWithAuth("http://localhost:5000/api/notes/" + id, {
        method: "DELETE"
    });
    loadDashboard();
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>
</body>
</html>
