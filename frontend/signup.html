<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Personal Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f7f8fc; }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
      <h2 class="text-center mb-4">Create Account</h2>

      <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
      <input type="email" id="email" class="form-control mb-3" placeholder="Email">
      <input type="password" id="password" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-primary w-100" onclick="signup()">Sign Up</button>

      <p class="mt-3 text-center">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    async function signup() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("Please fill all fields.");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters long.");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("name", data.name);
          window.location.href = "dashboard.html";
        } else {
          alert(data.msg || "Signup failed");
        }
      } catch (error) {
        console.error(error);
        alert("Unable to connect to server.");
      }
    }
  </script>
</body>
</html>
